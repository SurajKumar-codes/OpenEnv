version: "3.9"

services:
  openenv:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openenv-data-cleaning
    env_file:
      - .env
    ports:
      - "7860:7860"
    environment:
      - PORT=7860
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7860/health')"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    restart: unless-stopped
